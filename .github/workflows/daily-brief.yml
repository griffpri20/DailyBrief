name: Daily Briefing

on:
  workflow_dispatch: # manual trigger only

permissions:
  contents: write

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secret files
        env:
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
          TOKEN_CALENDAR_JSON: ${{ secrets.TOKEN_CALENDAR_JSON }}
        run: |
          echo "$CREDENTIALS_JSON" | base64 --decode > credentials.json
          echo "$TOKEN_CALENDAR_JSON" | base64 --decode > token_calendar.json

      - name: Run daily briefing
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          CITY_NAME: "Chicago, IL"
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python daily_briefing.py
